name: Create Release

on:
  push:
    tags:
      - 'v*' # Triggers on any tag pushed matching v1.0.0, v1.1.0, etc.

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Release ZIP Package
        run: |
          zip -r void_bridge_${{ github.ref_name }}.zip client/ server/ config.lua fxmanifest.lua README.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: void_bridge_${{ github.ref_name }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
